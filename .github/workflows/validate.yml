name: Validate versions.json

on:
  pull_request:
    paths:
      - 'versions.json'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'versions.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON syntax
        run: jq '.' versions.json > /dev/null

      - name: Required top-level fields
        run: |
          jq -e '
            (.schema_version | type) == "number" and
            (.products       | type) == "object"
          ' versions.json > /dev/null

      - name: Required per-product fields + semver shape
        run: |
          # Every product must declare these keys, and version strings must
          # match X.Y.Z (digits only). Extra keys allowed for forward compat.
          jq -e '
            .products
            | to_entries
            | all(
                .value
                | (.latest        | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) and
                  (.minimum       | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) and
                  (.released_at   | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$")) and
                  (.download_url  | startswith("https://")) and
                  (.changelog_url | startswith("https://"))
              )
          ' versions.json > /dev/null

      - name: minimum <= latest
        # Quick gate: nobody should publish a manifest where minimum > latest
        # (would force-block every client immediately).
        run: |
          jq -r '.products | to_entries[] | "\(.key) \(.value.minimum) \(.value.latest)"' versions.json |
          while read -r product min latest; do
            if [ "$(printf '%s\n%s\n' "$min" "$latest" | sort -V | head -n1)" != "$min" ]; then
              echo "::error::Product $product: minimum ($min) > latest ($latest)"
              exit 1
            fi
          done
